name: Pull request tests
run-name: Pull request tests ${{ github.head_ref }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'server/**'
      - 'client/**'
      - 'package*.json'
      - '.github/workflows/docker-pr-build.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  test-server:
    name: Server tests & coverage (90%)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Thresholds live in server/vitest.config.js: falling below them fails
      # this step, which blocks the PR (docker-build needs this job).
      - name: Run server tests with coverage gate
        run: node ../node_modules/vitest/vitest.mjs run --coverage
        working-directory: server

      # The coverage table, readable without downloading anything: on the run's
      # summary page, and as a sticky comment kept up to date on the PR.
      - name: Coverage summary (run page)
        if: always()
        run: |
          python3 .github/scripts/coverage_summary.py \
            server/coverage/coverage-summary.json --gate 90 \
            | tee coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Coverage comment (PR, sticky)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- server-coverage -->';
            let table;
            try {
              table = fs.readFileSync('coverage-summary.md', 'utf8');
            } catch {
              table = '⚠️ Rapport de couverture indisponible (les tests ont probablement échoué avant).';
            }
            const body = `${marker}\n${table}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

      # Reports downloadable from the run page — also on failure, which is
      # precisely when they matter.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage-report
          path: server/coverage
          retention-days: 7

  test-client:
    name: Client tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run client tests
        run: node ../node_modules/vitest/vitest.mjs run
        working-directory: client

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: jewelbox:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
