name: Docker Main Test

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'server/**'
      - 'client/**'
      - 'package*.json'
      - '.github/workflows/docker-master-test.yml'

jobs:
  # A merge commit is code nobody ran the suite against: PRs are tested, but
  # the result of merging them isn't, so the same gate runs here too.
  test-server:
    name: Server tests & coverage (90%)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run server tests with coverage gate
        run: node ../node_modules/vitest/vitest.mjs run --coverage
        working-directory: server

      - name: Coverage summary (run page)
        if: always()
        run: |
          python3 .github/scripts/coverage_summary.py \
            server/coverage/coverage-summary.json --gate 90 >> "$GITHUB_STEP_SUMMARY"

  test-client:
    name: Client tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run client tests
        run: node ../node_modules/vitest/vitest.mjs run
        working-directory: client

  test-build:
    name: Test Docker build on main
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: jewelbox:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        run: |
          docker run --rm -d --name jewelbox-test \
            -p 3001:3001 \
            jewelbox:main-${{ github.sha }}
          
          sleep 10
          
          curl -f http://localhost:3001/api/health || exit 1
          
          docker stop jewelbox-test
