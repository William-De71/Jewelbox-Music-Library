version: '3.9'

services:
  jewelbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: jewelbox-app
    ports:
      - "3001:3001"
    volumes:
      - jewelbox_data:/app/server/data
      # Music library (read-only) for the built-in audio player.
      # Uncomment and adapt, then set "/music" as the library path in Settings.
      # - /path/to/your/music:/music:ro
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      # mDNS discovery: multicast does not cross the default bridge NAT, so the
      # advertisement would be invisible from the LAN. Switch this to "true"
      # only together with network_mode: host (and drop the ports section).
      MDNS_ENABLED: ${MDNS_ENABLED:-false}
      # Optional: use your own Last.fm application instead of the built-in key
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      LASTFM_API_SECRET: ${LASTFM_API_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  jewelbox_data:
    driver: local
